name: deepeval-ci
on: pull_request:
    paths:
        - "ci/deepeval_tests/**"
        - "harness/**"
jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            - run: |
                python -m pip install --upgrade pip
                pip install deepeval pytest
            - run: pytest -q ci/deepeval_tests